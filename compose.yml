version: "3.9"
services: 
  nginx:
    container_name: nginx
    image: nginx
    volumes: 
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
    - two-tier
    ports:
      - "80:80"

  mysql:
    image: mysql
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devops
    networks: 
      - two-tier
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
    restart: always
    ports: 
      - "3306:3306"

  two-tier-app:
    build:
      context: .
    ports: 
      - "5000:5000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_DB: devops
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    networks:
      - two-tier
    depends_on:
      - mysql
    restart: always
networks: 
  two-tier:

