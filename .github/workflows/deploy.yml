name: deploy app 
on:
  workflow_dispatch:
jobs: 
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code 
        uses: actions/checkout@v4
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD  }}
      - name: build image
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/two-tier-app:latest . 
      - name: push image
        run: docker push ${{secrets.DOCKER_USERNAME}}/two-tier-app:latest
      - name: deploy ec2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST_NAME}}
          username: ubuntu
          key: ${{secrets.EC2_SSH_KEY}}
          script: |
            cd ~/two-tier-flask-app-with-cicd

            git pull origin master

            docker compose pull

            docker compose up -d
